    *{

    body{

    .bg{

      margin-bottom:25px;
      font-weight:800;
    }

      line-height:1.8;

    }

    .buttons{

    .btn{
      text-decoration:none;
      padding:18px 34px;
      border-radius:14px;
      font-size:18px;
      font-weight:700;
      transition:0.3s;
      display:inline-flex;
      align-items:center;
      gap:12px;
    }

    .btn-primary{
      background:linear-gradient(135deg,#FFD700,#ffb700);
      color:#000;
      box-shadow:0 0 25px rgba(255,215,0,0.35);
    }

    .btn-primary:hover{
      transform:translateY(-4px) scale(1.03);
    }

    .btn-whatsapp{

      color:#fff;
      box-shadow:0 0 20px rgba(31,170,89,0.35);

      justify-content:center;
      align-items:center;
    }

    .main-image{
      width:100%;
      max-width:620px;
      border-radius:24px;
      overflow:hidden;
      border:2px solid rgba(255,215,0,0.3);
      box-shadow:
      0 0 40px rgba(255,215,0,0.12),
      0 0 80px rgba(255,215,0,0.08);
    }

    .main-image img{
      width:100%;
      display:block;
    }

    footer{
      text-align:center;
      padding:30px 20px;
      color:#9e9e9e;
      border-top:1px solid rgba(255,215,0,0.1);
    }

    @media(max-width:980px){
